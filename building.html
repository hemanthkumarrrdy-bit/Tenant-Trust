<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Building Complaints — TenantTrust</title>
    <meta name="description"
        content="View building complaint history, maintenance scores, and inspector visit logs on TenantTrust." />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        .page-top {
            padding: 100px 0 0;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            transition: var(--transition);
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .building-header {
            display: flex;
            align-items: flex-start;
            gap: 24px;
            padding: 28px 32px;
            background: #fff;
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }

        @media(max-width:700px) {
            .building-header {
                flex-direction: column;
            }
        }

        .building-icon {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-md);
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            box-shadow: var(--shadow-primary);
        }

        .building-info {
            flex: 1;
        }

        .building-name {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .building-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .building-meta span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .building-meta span strong {
            color: var(--text-primary);
        }

        .maint-badge {
            padding: 10px 20px;
            border-radius: var(--radius-full);
            font-size: 22px;
            font-weight: 800;
            border: 2px solid;
            text-align: center;
            min-width: 80px;
        }

        /* Filter bar */
        .filter-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .filter-select {
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            padding: 7px 16px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }

        .filter-select:focus,
        .filter-select:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        @media(max-width:768px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            padding: 20px;
        }

        .chart-card h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .chart-canvas-wrap {
            height: 200px;
            position: relative;
        }
    </style>
</head>

<body>

    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-inner">
                <a href="index.html" class="nav-logo">
                    <div class="nav-logo-icon">🏠</div>
                    <span>Tenant<span class="gradient-text">Trust</span></span>
                </a>
                <div class="nav-links" id="nav-links">
                    <a href="search.html" class="nav-link active">Search</a>
                    <a href="rent-trends.html" class="nav-link">Rent Trends</a>
                    <a href="submit-review.html" class="nav-link">Submit Review</a>
                    <a href="signin.html" class="btn btn-outline btn-sm">Sign In</a>
                    <a href="signup.html" class="btn btn-primary btn-sm nav-cta">Sign Up Free</a>
                </div>
                <button class="nav-hamburger" onclick="toggleMenu()"
                    aria-label="Menu"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <div class="page-top">
        <div class="container" style="padding-bottom:80px">
            <a href="search.html" class="back-link">← Back to Search</a>
            <div id="building-content">
                <!-- Skeleton -->
                <div class="building-header">
                    <div class="skeleton" style="width:64px;height:64px;border-radius:14px;flex-shrink:0"></div>
                    <div style="flex:1">
                        <div class="skeleton" style="height:22px;width:55%;margin-bottom:12px"></div>
                        <div style="display:flex;gap:8px">
                            <div class="skeleton" style="height:24px;width:100px;border-radius:20px"></div>
                            <div class="skeleton" style="height:24px;width:100px;border-radius:20px"></div>
                        </div>
                    </div>
                </div>
                <div class="skeleton" style="height:320px;border-radius:14px"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top:none;padding-top:0">
                <p>© 2025 TenantTrust. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/building.js"></script>
    <script>function toggleMenu() { document.getElementById('nav-links').classList.toggle('mobile-open'); }</script>
</body>

</html>
