<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landlord Profile — TenantTrust</title>
    <meta name="description"
        content="View landlord ratings, reviews, red flags, properties managed, and Fair Rent Score on TenantTrust." />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        .page-top {
            padding: 100px 0 0;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            transition: var(--transition);
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* Profile header */
        .profile-header {
            display: flex;
            align-items: flex-start;
            gap: 24px;
            padding: 28px 32px;
            background: #fff;
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }

        @media(max-width:700px) {
            .profile-header {
                flex-direction: column;
            }
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .profile-meta span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .profile-meta span strong {
            color: var(--text-primary);
        }

        .profile-rating-big {
            font-family: 'Outfit', sans-serif;
            font-size: 40px;
            font-weight: 900;
            color: var(--warning);
            line-height: 1;
        }

        .profile-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-width: 120px;
        }

        /* Layout */
        .profile-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            padding-bottom: 80px;
        }

        @media(max-width:900px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Rating bars */
        .ratings-section {
            padding: 24px;
        }

        .ratings-section h4 {
            margin-bottom: 18px;
            font-size: 15px;
        }

        /* Property item */
        .property-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-card);
        }

        .property-item:last-child {
            border-bottom: none;
        }

        .property-icon {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 19px;
            flex-shrink: 0;
        }

        .property-detail {
            flex: 1;
        }

        .property-detail .addr {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .property-detail .rent {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Review card */
        .review-item {
            padding: 20px;
            background: #fff;
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            margin-bottom: 14px;
            box-shadow: var(--shadow-xs);
            transition: var(--transition);
        }

        .review-item:hover {
            border-color: rgba(67, 97, 238, 0.18);
            box-shadow: var(--shadow-md);
        }

        .review-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .reviewer {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .reviewer .name {
            font-size: 14px;
            font-weight: 600;
        }

        .reviewer .date {
            font-size: 11px;
            color: var(--text-muted);
        }

        .review-body {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .review-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }

        .upvote-btn {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }

        .upvote-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: var(--primary-light);
        }

        /* Chart */
        .chart-wrap {
            padding: 24px;
        }

        .chart-wrap h4 {
            margin-bottom: 16px;
            font-size: 15px;
        }

        .chart-container {
            height: 240px;
            position: relative;
        }

        /* Sidebar card */
        .sidebar-card {
            padding: 20px;
            margin-bottom: 20px;
        }

        .sidebar-card h4 {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
        }
    </style>
</head>

<body>

    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-inner">
                <a href="index.html" class="nav-logo">
                    <div class="nav-logo-icon">🏠</div>
                    <span>Tenant<span class="gradient-text">Trust</span></span>
                </a>
                <div class="nav-links" id="nav-links">
                    <a href="search.html" class="nav-link active">Search</a>
                    <a href="rent-trends.html" class="nav-link">Rent Trends</a>
                    <a href="submit-review.html" class="nav-link">Submit Review</a>
                    <a href="signin.html" class="btn btn-outline btn-sm">Sign In</a>
                    <a href="signup.html" class="btn btn-primary btn-sm nav-cta">Sign Up Free</a>
                </div>
                <button class="nav-hamburger" onclick="toggleMenu()"
                    aria-label="Menu"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <div class="page-top">
        <div class="container" style="padding-bottom:80px">
            <a href="search.html" class="back-link">← Back to Search</a>
            <div id="profile-content">
                <!-- Skeleton -->
                <div class="profile-header">
                    <div class="avatar avatar-lg skeleton" style="flex-shrink:0"></div>
                    <div style="flex:1">
                        <div class="skeleton" style="height:22px;width:50%;margin-bottom:10px"></div>
                        <div class="skeleton" style="height:14px;width:35%;margin-bottom:16px"></div>
                        <div style="display:flex;gap:8px">
                            <div class="skeleton" style="height:28px;width:80px;border-radius:20px"></div>
                            <div class="skeleton" style="height:28px;width:80px;border-radius:20px"></div>
                        </div>
                    </div>
                </div>
                <div class="skeleton" style="height:360px;border-radius:14px"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top:none;padding-top:0">
                <p>© 2025 TenantTrust. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/landlord.js"></script>
    <script>function toggleMenu() { document.getElementById('nav-links').classList.toggle('mobile-open'); }</script>
</body>

</html>
